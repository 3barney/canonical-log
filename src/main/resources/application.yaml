server:
  port: 8080

spring:
  application:
    name: canonical-log
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:repaymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

ledger-service:
  api:
    base-url: http://localhost:8080/mock/ledger_service

canonical:
  log:
    format: text # "text" for grep-friendly logfmt, "json" for structured JSON
    include-bodies: true

logging:
  level:
    root: INFO
    canonical: INFO
    com.example.canonicallog: DEBUG
    org.springframework.web.client: WARN
    org.hibernate.SQL: WARN
